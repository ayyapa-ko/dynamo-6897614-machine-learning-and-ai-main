# Diversity taxonomy — controlled vocabulary for task.toml [metadata] labels.
# Source: TB_spec/TB_spec_diversity.md. Consumed by checks/check-diversity-labels.py.
#
# All labels are written in lowercase snake_case. Matching is case- and
# separator-insensitive, so "software_engineering", "software engineering", and
# "Software Engineering" all resolve to the same entry. [metadata].category must be
# one of the [categories] keys; subcategory should be one of that category's listed
# values (additional subcategories are allowed by the spec — an unlisted one is a
# warning, not a failure). task_objective[] and artifact_type[] are CLOSED sets:
# every value must appear below.
#
# NOTE: task_objective and artifact_type are declared BEFORE [categories] on purpose
# — in TOML, keys after a table header belong to that table.

# Closed set — every [metadata].task_objective value must be one of these.
task_objective = [
  "implement", "fix", "configure", "analyze", "transform", "validate",
  "optimize", "migrate", "refactor", "test", "debug", "build_or_package",
  "deploy_or_operate", "recover_or_repair_artifact", "generate",
  "compare_or_select", "secure_or_harden", "automate_workflow",
]

# Closed set — every [metadata].artifact_type value must be one of these.
artifact_type = [
  "codebase", "single_script_or_program", "test_suite_or_benchmark",
  "build_system_or_package_metadata", "configuration_file", "shell_environment",
  "service_or_daemon", "container_or_virtual_environment",
  "database_or_structured_store", "dataset_or_tabular_file", "text_or_log_file",
  "document_or_report", "archive_or_compressed_artifact",
  "binary_executable_or_library", "media_artifact", "model_or_checkpoint",
  "hardware_or_firmware_artifact", "network_endpoint_or_protocol_artifact",
  "repository_history_or_version_control_state", "security_artifact",
  "mathematical_or_scientific_model", "generated_output_artifact",
]


# Dynamo agent trials (pass@k).
#
# PROVIDED workflow. A maintainer triggers it with a `/run` comment to run a
# coding agent against your task. Maintained centrally by the Dynamo team —
# please don't edit this file.

name: Dynamo Run Trials

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run trials against"
        required: true
        type: string
      overrides:
        description: "Same syntax as the /run comment (e.g. 'trials=3 agents=claude-code:anthropic/claude-opus-4.8 env=daytona')"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      overrides: ${{ steps.check.outputs.overrides }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - name: Check trigger + maintainer access, pin head SHA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_PR_URL: ${{ github.event.issue.pull_request.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_OVERRIDES: ${{ inputs.overrides }}
        run: |
          SHOULD=false; PRN=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHOULD=true; PRN="$INPUT_PR_NUMBER"
            { echo "overrides<<EOF"; echo "$INPUT_OVERRIDES"; echo "EOF"; } >> $GITHUB_OUTPUT
          elif [ -n "$ISSUE_PR_URL" ] && [[ "$COMMENT_BODY" =~ (^|[[:space:]])/run([[:space:]]|$) ]]; then
            # /run runs untrusted task code and spends the model key; require write access.
            PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENT_USER}/permission" --jq '.permission' 2>/dev/null || echo "none")
            if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
              SHOULD=true; PRN="$ISSUE_NUMBER"
              { echo "overrides<<EOF"; echo "$COMMENT_BODY"; echo "EOF"; } >> $GITHUB_OUTPUT
            else
              echo "User ${COMMENT_USER} lacks write access"
            fi
          fi
          echo "should_run=$SHOULD" >> $GITHUB_OUTPUT
          echo "pr_number=$PRN" >> $GITHUB_OUTPUT
          if [ "$SHOULD" = "true" ]; then
            # Resolve the PR head ONCE and pin it (immutable) for the run.
            HEAD_SHA=$(gh pr view "$PRN" --repo "$REPO" --json headRefOid -q '.headRefOid')
            echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
            echo "Pinned head SHA: $HEAD_SHA"
          fi

      - name: Acknowledge the /run comment (🚀)
        if: steps.check.outputs.should_run == 'true' && github.event.comment.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" -f content='rocket' || true

  run:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    uses: handshake-project-dynamo/handshake-orchestration-tb2/.github/workflows/dynamo-run-trials.yml@main
    with:
      pr_number: ${{ needs.gate.outputs.pr_number }}
      head_sha: ${{ needs.gate.outputs.head_sha }}
      overrides: ${{ needs.gate.outputs.overrides }}
    secrets: inherit
